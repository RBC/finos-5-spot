# Example ScheduledMachine with a weekend schedule.
# This machine follows the TimeBasedSpotSchedule provider object "weekend-only"
# (defined in examples/timebasedspotschedule.yaml): active Saturday-Sunday,
# 24 hours, in UTC.

apiVersion: 5spot.finos.org/v1beta1
kind: ScheduledMachine
metadata:
  name: weekend-worker
  namespace: default
spec:
  # Name of the CAPI Cluster this machine will join
  clusterName: my-k0s-cluster

  # Administrative master switch (ADR 0009); defaults to true.
  enabled: true

  # Required reference to the spot-schedule provider that owns the
  # active/inactive decision (ADR 0009). The day/hour window now lives on the
  # referenced TimeBasedSpotSchedule, not inline here.
  schedule:
    apiVersion: spotschedules.5spot.finos.org/v1alpha1
    kind: TimeBasedSpotSchedule
    name: weekend-only

  # Inline bootstrap specification (creates K0sWorkerConfig)
  bootstrapSpec:
    apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
    kind: K0sWorkerConfig
    spec:
      version: v1.30.0+k0s.0

  # Inline infrastructure specification (creates RemoteMachine)
  infrastructureSpec:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: RemoteMachine
    spec:
      address: 192.168.1.101
      port: 22
      user: admin

  # Higher priority than weekday workers
  priority: 75
  gracefulShutdownTimeout: 10m
  nodeDrainTimeout: 10m
  killSwitch: false
