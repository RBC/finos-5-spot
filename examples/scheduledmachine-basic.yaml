# Example ScheduledMachine resource
# This machine follows the TimeBasedSpotSchedule provider object "business-hours"
# (defined in examples/timebasedspotschedule.yaml): active Monday-Friday,
# 9am-5pm Eastern Time. The controller will create:
#   1. A K0sWorkerConfig bootstrap resource
#   2. A RemoteMachine infrastructure resource
#   3. A CAPI Machine referencing both

apiVersion: 5spot.finos.org/v1beta1
kind: ScheduledMachine
metadata:
  name: business-hours-worker
  namespace: default
spec:
  # Name of the CAPI Cluster this machine will join
  clusterName: my-k0s-cluster

  # Administrative master switch (ADR 0009). When false the machine is held
  # Disabled regardless of what the schedule provider reports. Defaults to true.
  enabled: true

  # Required reference to the spot-schedule provider that owns the
  # active/inactive decision (ADR 0009). The group MUST be
  # spotschedules.5spot.finos.org; the object must live in THIS namespace.
  # The default, first-party provider is TimeBasedSpotSchedule.
  schedule:
    apiVersion: spotschedules.5spot.finos.org/v1alpha1
    kind: TimeBasedSpotSchedule
    name: business-hours

  # Inline bootstrap specification (creates K0sWorkerConfig)
  # Name is auto-generated as: business-hours-worker
  bootstrapSpec:
    apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
    kind: K0sWorkerConfig
    spec:
      version: v1.30.0+k0s.0
      # Add any K0sWorkerConfig-specific fields here

  # Inline infrastructure specification (creates RemoteMachine)
  # Name is auto-generated as: business-hours-worker
  infrastructureSpec:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: RemoteMachine
    spec:
      address: 192.168.1.100
      port: 22
      user: admin
      # Add any RemoteMachine-specific fields here

  # Optional: Labels and annotations for the created CAPI Machine
  machineTemplate:
    labels:
      node-role.kubernetes.io/worker: ""
      topology.kubernetes.io/zone: zone-a
    annotations:
      5spot.finos.org/scheduled-by: business-hours-worker

  # Lifecycle settings
  priority: 50
  gracefulShutdownTimeout: 5m
  nodeDrainTimeout: 5m
  killSwitch: false
