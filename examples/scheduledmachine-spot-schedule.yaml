# Example ScheduledMachine driven by the CapitalMarketsSchedule spot-schedule
# provider (ADR 0006, ADR 0009).
#
# This machine delegates its active/inactive decision entirely to a
# CapitalMarketsSchedule provider object named "nyse-equities" in the SAME
# namespace (see examples/capitalmarketsschedule.yaml). The 5-Spot controller
# watches that provider and reads only its duck-typed `status.active` — the
# provider alone decides; there is no longer an inline time window to compose
# with (ADR 0009 reified the former inline schedule into the
# TimeBasedSpotSchedule provider).
#
# To follow a plain day/hour window instead of an exchange calendar, reference a
# TimeBasedSpotSchedule here instead (see examples/timebasedspotschedule.yaml).

apiVersion: 5spot.finos.org/v1beta1
kind: ScheduledMachine
metadata:
  name: trading-floor-rack-7
  namespace: capital-markets
spec:
  clusterName: my-k0s-cluster
  enabled: true

  # Required reference to the spot-schedule provider that owns the
  # active/inactive decision (ADR 0009). The group MUST be
  # spotschedules.5spot.finos.org (CEL-enforced); any served version is
  # accepted. The object must live in this SM's namespace.
  schedule:
    apiVersion: spotschedules.5spot.finos.org/v1alpha1
    kind: CapitalMarketsSchedule
    name: nyse-equities

  bootstrapSpec:
    apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
    kind: K0sWorkerConfig
    spec:
      version: v1.30.0+k0s.0

  infrastructureSpec:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: RemoteMachine
    spec:
      address: 192.168.1.100
      port: 22
      user: admin

  priority: 50
  gracefulShutdownTimeout: 5m
  nodeDrainTimeout: 5m
