apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: timebasedspotschedules.spotschedules.5spot.finos.org
spec:
  group: spotschedules.5spot.finos.org
  names:
    categories: []
    kind: TimeBasedSpotSchedule
    plural: timebasedspotschedules
    shortNames:
    - tbss
    singular: timebasedspotschedule
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.active
      name: Active
      type: boolean
    - jsonPath: .spec.enabled
      name: Enabled
      type: boolean
    - jsonPath: .spec.timezone
      name: Timezone
      type: string
    - jsonPath: .status.nextTransitionTime
      name: NextTransition
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for TimeBasedSpotScheduleSpec via `CustomResource`
        properties:
          spec:
            description: |-
              The **core, first-party** spot-schedule provider (ADR 0009): the reified
              former inline `ScheduledMachine.spec.schedule`. Its `spec` declares a
              day-of-week / hour-of-day window in a configured timezone; the provider
              controller (`src/providers/time_based.rs`) evaluates it and publishes the
              duck-typed [`status.active`](TimeBasedSpotScheduleStatus::active) a
              `ScheduledMachine.spec.schedule` consumes (ADR 0006 contract). 5-Spot's main
              controller reads only that status, never this spec.
            properties:
              daysOfWeek:
                default: []
                description: |-
                  Days of the week when the schedule is active.
                  Supports: individual days (mon), ranges (mon-fri), combinations (mon-wed,fri-sun)
                items:
                  type: string
                type: array
              enabled:
                default: true
                description: |-
                  Provider-level enable switch. When `false`, `status.active` is always
                  `false` (the window is ignored). This is the *provider's* own toggle;
                  the SM-scoped administrative switch is `ScheduledMachine.spec.enabled`.
                type: boolean
              hoursOfDay:
                default: []
                description: |-
                  Hours when the schedule is active (0-23)
                  Supports: individual hours (9), ranges (9-17), combinations (0-9,18-23)
                items:
                  type: string
                type: array
              timezone:
                default: UTC
                description: |-
                  Timezone for the schedule (e.g., "UTC", "America/New\_York")
                  Maximum length of 64 characters.
                maxLength: 64
                pattern: ^[A-Za-z][A-Za-z0-9_+\-/]*$
                type: string
            type: object
          status:
            description: |-
              Runtime status of a [`TimeBasedSpotSchedule`]. Satisfies the spot-schedule
              provider contract (ADR 0006): the authoritative signal is
              [`active`](Self::active); `conditions[type=Ready]`, `observedGeneration`,
              and `lastTransitionTime`/`nextTransitionTime` are the recommended
              observability surface. Mirrors [`CapitalMarketsScheduleStatus`].
            nullable: true
            properties:
              active:
                default: false
                description: |-
                  **The contract field.** `true` ⇒ a `ScheduledMachine` referencing this
                  object should be active; `false` ⇒ it should be inactive.
                type: boolean
              conditions:
                default: []
                description: |-
                  Standard Kubernetes conditions. A `Ready` condition is recommended so
                  consumers can distinguish "computed and current" from "stale/unhealthy".
                items:
                  properties:
                    lastTransitionTime:
                      description: Last transition time (RFC3339 format)
                      type: string
                    message:
                      description: Human-readable message
                      type: string
                    reason:
                      description: One-word reason in CamelCase
                      type: string
                    status:
                      description: 'Status: "True", "False", or "Unknown"'
                      enum:
                      - 'True'
                      - 'False'
                      - Unknown
                      type: string
                    type:
                      description: Type of condition (e.g., "Ready", "`MachineReady`", "`ReferencesValid`")
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastTransitionTime:
                description: When `active` last transitioned (RFC3339).
                nullable: true
                type: string
              nextTransitionTime:
                description: |-
                  When `active` is next expected to transition (RFC3339) — the next
                  day/hour window boundary. Lets the provider requeue exactly at the
                  boundary instead of polling.
                nullable: true
                type: string
              observedGeneration:
                description: The `metadata.generation` this status reflects, for staleness detection.
                format: int64
                nullable: true
                type: integer
            type: object
        required:
        - spec
        title: TimeBasedSpotSchedule
        type: object
    served: true
    storage: true
    subresources:
      status: {}
