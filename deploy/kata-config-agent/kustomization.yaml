# 5-Spot Kata Config Agent — Kustomization
#
# Apply with:
#   kubectl apply -k deploy/kata-config-agent/
#
# The DaemonSet is opt-in via the node label
# `5spot.finos.org/kata-config=enabled`. Applying this kustomization on a
# fleet with no labeled nodes is a no-op — the pods won't schedule anywhere
# until the controller stamps the label on a node whose parent
# ScheduledMachine has `spec.kata` set and the source object resolves on
# the workload cluster (ADR 0002).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: 5spot-system
resources:
  - rbac.yaml
  - daemonset.yaml
