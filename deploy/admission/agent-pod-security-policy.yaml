# ValidatingAdmissionPolicy — pod-security exception boundary for the 5-Spot
# node agents (ADR 0004).
#
# APPLIED TO: the WORKLOAD cluster (where the agent DaemonSets run), NOT the
# management cluster.
#
# Purpose
# -------
# The two 5-Spot node agents deliberately exceed the Pod Security Standards:
#
#   5spot-kata-config-agent  privileged + hostPID + hostPath / (RW)   (ADR 0003)
#   5spot-reclaim-agent      hostPID + CAP_NET_ADMIN + hostPath /proc,
#                            /etc/machine-id (RO)
#
# Kubernetes admission is CONJUNCTIVE: every plugin must admit a request and
# any single deny is final, so NO ValidatingAdmissionPolicy can "allow" or
# override a deny issued by Pod Security Admission, OPA Gatekeeper, or
# Kyverno. The exemption for 5spot-system must be granted inside whichever
# engine enforces your baseline (recipes below). That exemption is namespace-
# wide — which is exactly the hole THIS policy closes: it re-imposes a
# deny-by-default baseline on everything in 5spot-system EXCEPT the two agent
# identities, clamped to their exact documented posture. Exemption + this
# policy are a paired deployment: the exemption opens one door, this policy
# stands behind it.
#
# Baseline-engine exemption recipes (pick the one your cluster runs)
# ------------------------------------------------------------------
# Pod Security Admission (in-tree):
#   kubectl label namespace 5spot-system \
#     pod-security.kubernetes.io/enforce=privileged \
#     pod-security.kubernetes.io/audit=privileged \
#     pod-security.kubernetes.io/warn=privileged
#
# OPA Gatekeeper: add 5spot-system to each relevant constraint's
#   spec.match.excludedNamespaces, or exempt it cluster-wide via
#   config.gatekeeper.sh/v1alpha1 Config (match.excludedNamespaces).
#
# Kyverno: add to the relevant ClusterPolicy rules:
#   exclude:
#     any:
#       - resources:
#           namespaces: ["5spot-system"]
#
# Requirements
# ------------
# Kubernetes >= 1.30 (admissionregistration.k8s.io/v1 ValidatingAdmissionPolicy
# GA) — same floor as deploy/admission/validatingadmissionpolicy.yaml.
#
# Apply with (against the workload cluster kubeconfig):
#   kubectl apply -f deploy/admission/agent-pod-security-policy.yaml
#   kubectl apply -f deploy/admission/agent-pod-security-binding.yaml
#
# Maintenance contract (ADR 0004): the agent DaemonSets and this allowlist
# evolve TOGETHER. Adding a capability, hostPath, or new agent requires
# updating the CEL here in the same change, plus re-justification in
# .trivyignore and docs/src/security/threat-model.md.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: 5spot-agent-pod-security
  labels:
    app.kubernetes.io/name: 5spot
    app.kubernetes.io/component: admission
    app.kubernetes.io/part-of: child-cluster
    app.kubernetes.io/managed-by: 5spot-controller
spec:
  # Security boundary — fail CLOSED. A policy evaluation error must deny the
  # pod rather than silently waving privileged workloads into the exempted
  # namespace. (Contrast with the kata-runtime label mutating policy, which
  # is Ignore because blocking Node registration would break the cluster.)
  failurePolicy: Fail

  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods", "pods/ephemeralcontainers"]
        operations: ["CREATE", "UPDATE"]

  variables:
    # Pod identity = ServiceAccount. The agent SAs are bound only to their
    # DaemonSets and carry narrow, dedicated RBAC (deploy/*/rbac.yaml), so SA
    # is the strongest identity signal available at admission time.
    - name: sa
      expression: >-
        has(object.spec.serviceAccountName) ? object.spec.serviceAccountName : 'default'
    - name: isKataAgent
      expression: "variables.sa == '5spot-kata-config-agent'"
    - name: isReclaimAgent
      expression: "variables.sa == '5spot-reclaim-agent'"
    - name: isAgent
      expression: "variables.isKataAgent || variables.isReclaimAgent"
    # Regular + init containers share the Container schema; ephemeral
    # containers are validated separately (they may never be risky).
    - name: allContainers
      expression: >-
        object.spec.containers
        + (has(object.spec.initContainers) ? object.spec.initContainers : [])
    - name: ephemeralContainers
      expression: >-
        has(object.spec.ephemeralContainers) ? object.spec.ephemeralContainers : []
    - name: hostPathVolumes
      expression: >-
        has(object.spec.volumes) ? object.spec.volumes.filter(v, has(v.hostPath)) : []

  validations:

    # ── 1. hostPID: agents only ─────────────────────────────────────────────
    # kata-config-agent: `nsenter -t 1` must resolve host PID 1 (ADR 0003).
    # reclaim-agent: scans host /proc for emergency process matches.
    - expression: >-
        !(has(object.spec.hostPID) && object.spec.hostPID) || variables.isAgent
      message: >-
        hostPID in 5spot-system is restricted to the 5-Spot node agents
        (serviceAccountName 5spot-kata-config-agent or 5spot-reclaim-agent)
      reason: Forbidden

    # ── 2. hostNetwork: denied for everyone ─────────────────────────────────
    # No 5-Spot agent uses it; nothing in the namespace may.
    - expression: >-
        !(has(object.spec.hostNetwork) && object.spec.hostNetwork)
      message: "hostNetwork is not permitted in 5spot-system (no 5-Spot component uses it)"
      reason: Forbidden

    # ── 3. hostIPC: denied for everyone ─────────────────────────────────────
    - expression: >-
        !(has(object.spec.hostIPC) && object.spec.hostIPC)
      message: "hostIPC is not permitted in 5spot-system (no 5-Spot component uses it)"
      reason: Forbidden

    # ── 4. privileged: kata-config agent only ───────────────────────────────
    # Required for setns() into host namespaces — the nsenter k0s-service
    # restart (ADR 0003). The reclaim agent is deliberately NOT privileged
    # and this clamp keeps it that way.
    - expression: >-
        variables.allContainers.all(c,
          !(has(c.securityContext) && has(c.securityContext.privileged) && c.securityContext.privileged))
        || variables.isKataAgent
      message: >-
        privileged containers in 5spot-system are restricted to the kata config
        agent (serviceAccountName 5spot-kata-config-agent), per ADR 0003/0004
      reason: Forbidden

    # ── 5. privileged ⇒ readOnlyRootFilesystem (mandatory mitigation) ───────
    # The exception is conditional on the compensating control that justified
    # it: a privileged container that drops its read-only root filesystem is
    # outside the sanctioned posture.
    - expression: >-
        variables.allContainers.all(c,
          !(has(c.securityContext) && has(c.securityContext.privileged) && c.securityContext.privileged)
          || (has(c.securityContext.readOnlyRootFilesystem) && c.securityContext.readOnlyRootFilesystem))
      message: >-
        privileged containers must keep readOnlyRootFilesystem: true — the
        compensating control the privileged exception is conditioned on (ADR 0004)
      reason: Forbidden

    # ── 6a. hostPath: agents only ────────────────────────────────────────────
    - expression: >-
        variables.hostPathVolumes.size() == 0 || variables.isAgent
      message: >-
        hostPath volumes in 5spot-system are restricted to the 5-Spot node agents
      reason: Forbidden

    # ── 6b. hostPath clamp — kata config agent: '/' only ────────────────────
    # The dest path is operator-configurable per ScheduledMachine, so the
    # DaemonSet mounts the host root (ADR 0003); it may mount nothing else.
    - expression: >-
        !variables.isKataAgent
        || variables.hostPathVolumes.all(v, v.hostPath.path == '/')
      message: >-
        the kata config agent may only mount hostPath '/' (its documented
        posture, ADR 0003); any other hostPath is outside the sanctioned exception
      reason: Forbidden

    # ── 6c. hostPath clamp — reclaim agent: /proc and /etc/machine-id only ──
    - expression: >-
        !variables.isReclaimAgent
        || variables.hostPathVolumes.all(v, v.hostPath.path in ['/proc', '/etc/machine-id'])
      message: >-
        the reclaim agent may only mount hostPath '/proc' and '/etc/machine-id'
        (its documented posture); any other hostPath is outside the sanctioned exception
      reason: Forbidden

    # ── 7. capability adds: reclaim agent NET_ADMIN only ────────────────────
    # NET_ADMIN backs the netlink proc-connector subscription (rung 2). No
    # other identity may add any capability; the reclaim agent may add only
    # this one.
    - expression: >-
        variables.allContainers.all(c,
          !has(c.securityContext) || !has(c.securityContext.capabilities)
          || !has(c.securityContext.capabilities.add)
          || c.securityContext.capabilities.add.all(a,
               variables.isReclaimAgent && a == 'NET_ADMIN'))
      message: >-
        added Linux capabilities in 5spot-system are restricted to NET_ADMIN on
        the reclaim agent (serviceAccountName 5spot-reclaim-agent)
      reason: Forbidden

    # ── 8. explicit root: agents only ────────────────────────────────────────
    # Pods explicitly requesting UID 0 or runAsNonRoot: false must be one of
    # the two agents (kata: writes /etc/k0s on the host; reclaim: reads every
    # /proc/<pid>). Absent fields are not flagged — image-default users are
    # the baseline engine's concern, not this boundary's.
    - expression: >-
        variables.isAgent
        || ((!has(object.spec.securityContext)
             || ((!has(object.spec.securityContext.runAsUser) || object.spec.securityContext.runAsUser != 0)
                 && (!has(object.spec.securityContext.runAsNonRoot) || object.spec.securityContext.runAsNonRoot)))
            && variables.allContainers.all(c,
                 !has(c.securityContext)
                 || ((!has(c.securityContext.runAsUser) || c.securityContext.runAsUser != 0)
                     && (!has(c.securityContext.runAsNonRoot) || c.securityContext.runAsNonRoot))))
      message: >-
        explicitly running as root (runAsUser: 0 / runAsNonRoot: false) in
        5spot-system is restricted to the 5-Spot node agents
      reason: Forbidden

    # ── 9. agents must keep pod-level seccomp RuntimeDefault ────────────────
    # Second mandatory mitigation: the agents adopt the cluster's default
    # syscall filter; running unconfined voids the exception.
    - expression: >-
        !variables.isAgent
        || (has(object.spec.securityContext)
            && has(object.spec.securityContext.seccompProfile)
            && object.spec.securityContext.seccompProfile.type == 'RuntimeDefault')
      message: >-
        5-Spot agent pods must set pod-level seccompProfile.type: RuntimeDefault —
        the compensating control the exception is conditioned on (ADR 0004)
      reason: Forbidden

    # ── 10. ephemeral containers: never risky ────────────────────────────────
    # Debug containers injected via pods/ephemeralcontainers may not carry any
    # of the excepted attributes — the exception covers the agents' declared
    # workloads, not interactive escalation paths.
    - expression: >-
        variables.ephemeralContainers.all(c,
          !has(c.securityContext)
          || (!(has(c.securityContext.privileged) && c.securityContext.privileged)
              && !(has(c.securityContext.capabilities)
                   && has(c.securityContext.capabilities.add)
                   && c.securityContext.capabilities.add.size() > 0)
              && (!has(c.securityContext.runAsUser) || c.securityContext.runAsUser != 0)
              && (!has(c.securityContext.runAsNonRoot) || c.securityContext.runAsNonRoot)))
      message: >-
        ephemeral (debug) containers in 5spot-system may not be privileged, add
        capabilities, or run as root — the agent exception does not extend to them
      reason: Forbidden
